<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAE destinations — Vacation Homes</title>
<meta name="description" content="Browse vacation stays across 10 UAE destinations — Dubai Marina, Palm Jumeirah, Hatta Mountains, RAK Beach, Fujairah and Liwa Desert." />
<meta name="theme-color" content="#c66b3d" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%23c66b3d'/%3E%3Ctext%20x%3D'50%25'%20y%3D'58%25'%20font-family%3D'sans-serif'%20font-weight%3D'700'%20font-size%3D'30'%20fill%3D'%23fff'%20text-anchor%3D'middle'%3EV%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/vacation.css?v=20260514c" />
</head>
<body class="vacation">
<div data-shell-nav></div>

<section class="v-container v-section">
  <span class="v-eyebrow">10 destinations</span>
  <h1>Where to next?</h1>
  <p class="v-text-muted">From Dubai Marina penthouses to Liwa Desert glamping, RAK beach villas to Hatta mountain cabins.</p>
  <div class="v-grid v-grid-3 v-mt-3" id="grid"></div>
</section>

<div data-shell-foot></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script>
VacationApp.mountShell('nav.destinations');
var d = VACATION_DATA;
document.getElementById('grid').innerHTML = d.DESTINATIONS.map(function (de) {
  var count = d.LISTINGS.filter(function (l) { return l.destination_id === de.id; }).length;
  return ''
    + '<a class="v-card" href="search.html?destination=' + de.id + '" style="display:block;text-decoration:none;color:inherit;overflow:hidden;">'
    +   '<div style="aspect-ratio:16/9;background:#f0e9da;"><img src="' + de.hero + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;" /></div>'
    +   '<div style="padding:16px;">'
    +     '<h3 style="margin:0;">' + de.name + '</h3>'
    +     '<div class="v-text-muted" style="font-size:12px;">' + count + ' stays · from AED ' + de.avg_nightly + '/night</div>'
    +     '<p style="font-size:13px;margin:8px 0 0;">' + de.blurb + '</p>'
    +   '</div>'
    + '</a>';
}).join('');
</script>
</body>
</html>
