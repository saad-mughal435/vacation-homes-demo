<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Booking confirmed — Vacation Homes</title>
<meta name="theme-color" content="#c66b3d" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%23c66b3d'/%3E%3Ctext%20x%3D'50%25'%20y%3D'58%25'%20font-family%3D'sans-serif'%20font-weight%3D'700'%20font-size%3D'30'%20fill%3D'%23fff'%20text-anchor%3D'middle'%3EV%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/vacation.css?v=20260514c" />
</head>
<body class="vacation">
<div data-shell-nav></div>

<section class="v-container v-section" id="success-host"></section>

<div data-shell-foot></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script>
VacationApp.mountShell('nav.trips');

var ref = VacationApp.qs().ref;
var last = JSON.parse(localStorage.getItem('vacation.last_booking') || 'null');
var host = document.getElementById('success-host');

if (!last) {
  host.innerHTML = '<div class="v-empty"><h3>No confirmation found</h3><p>Try opening this from your trips page.</p><a class="v-btn v-btn--primary" href="trips.html">My trips</a></div>';
} else {
  VacationApp.api('/listings/' + last.listing_id).then(function (r) {
    var l = r.body.listing, h = r.body.host || {};
    var dest = VACATION_DATA.DESTINATIONS.find(function (x) { return x.id === l.destination_id; }) || {};
    host.innerHTML = ''
      + '<div style="max-width:780px;margin:0 auto;text-align:center;">'
      +   '<div style="font-size:48px;line-height:1;margin-bottom:18px;">✅</div>'
      +   '<h1 style="font-size:clamp(28px,3.6vw,40px);">Booking confirmed.</h1>'
      +   '<p class="v-text-muted">Reference: <strong style="font-family:var(--font-mono);color:var(--vacation-primary);">' + ref + '</strong></p>'
      +   '<div class="v-panel v-mt-3" style="text-align:left;display:flex;gap:14px;align-items:center;">'
      +     '<img src="' + l.photos[0] + '" alt="" style="width:96px;height:96px;border-radius:10px;object-fit:cover;flex:0 0 96px;" />'
      +     '<div style="flex:1;"><strong style="font-size:16px;">' + VacationApp.escapeHtml(l.title) + '</strong>'
      +     '<div class="v-text-muted" style="font-size:13px;">' + dest.name + ' · Hosted by ' + h.name + '</div>'
      +     '<div style="margin-top:8px;display:grid;gap:4px;font-size:13px;">'
      +       '<div><strong>Check in:</strong> ' + VacationApp.fmtDate(last.check_in) + '</div>'
      +       '<div><strong>Check out:</strong> ' + VacationApp.fmtDate(last.check_out) + '</div>'
      +       '<div><strong>' + last.nights + ' night' + (last.nights === 1 ? '' : 's') + '</strong> · Total: <strong>' + VacationApp.formatPriceExact(last.pricing.total) + '</strong></div>'
      +     '</div></div>'
      +   '</div>'
      +   '<div class="v-flex-wrap v-mt-3" style="justify-content:center;">'
      +     '<a class="v-btn v-btn--primary" href="trips.html#upcoming">View in My trips</a>'
      +     '<a class="v-btn v-btn--ghost" href="stay.html?id=' + l.id + '">Back to listing</a>'
      +     '<a class="v-btn v-btn--ghost" href="search.html">Find another stay</a>'
      +   '</div>'
      +   '<p class="v-text-muted v-mt-3" style="font-size:12px;">A confirmation email would be sent to ' + (JSON.parse(localStorage.getItem("vacation.user") || "{}").email || "you") + '. In this demo nothing is actually emailed.</p>'
      + '</div>';
  });
}
</script>
</body>
</html>
