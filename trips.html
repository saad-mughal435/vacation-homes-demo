<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My trips — Vacation Homes</title>
<meta name="theme-color" content="#c66b3d" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%23c66b3d'/%3E%3Ctext%20x%3D'50%25'%20y%3D'58%25'%20font-family%3D'sans-serif'%20font-weight%3D'700'%20font-size%3D'30'%20fill%3D'%23fff'%20text-anchor%3D'middle'%3EV%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/vacation.css?v=20260514" />
</head>
<body class="vacation">
<div data-shell-nav></div>

<section class="v-container v-section">
  <span class="v-eyebrow">Logged in as Demo Guest</span>
  <h1>My trips.</h1>
  <div class="v-flex-wrap v-mt-2" id="tabs">
    <a class="v-pill" href="#upcoming">🗓 Upcoming</a>
    <a class="v-pill" href="#in-progress">✈ In progress</a>
    <a class="v-pill" href="#past">✅ Past</a>
    <a class="v-pill" href="#cancelled">✖ Cancelled</a>
    <a class="v-pill" href="#saved">❤ Saved</a>
    <a class="v-pill" href="#profile">👤 Profile</a>
  </div>
  <div class="v-mt-3" id="host"></div>
</section>

<div data-shell-foot></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script>
VacationApp.mountShell('nav.trips');
var d = VACATION_DATA;
var host = document.getElementById('host');

function tab() { return (location.hash || '#upcoming').slice(1); }
function activate() {
  var t = tab();
  document.querySelectorAll('#tabs a').forEach(function (a) { a.classList.toggle('active', a.getAttribute('href') === '#' + t); });
  if (t === 'upcoming')    return renderBookings(['confirmed','pending'], 'No upcoming trips');
  if (t === 'in-progress') return renderBookings(['in-progress'], 'No active trips');
  if (t === 'past')        return renderBookings(['completed','refunded','disputed'], 'No past trips');
  if (t === 'cancelled')   return renderBookings(['cancelled'], 'No cancelled trips');
  if (t === 'saved')       return renderSaved();
  if (t === 'profile')     return renderProfile();
}
window.addEventListener('hashchange', activate);

function renderBookings(statuses, emptyText) {
  VacationApp.api('/bookings').then(function (r) {
    var items = r.body.items.filter(function (b) { return statuses.indexOf(b.status) !== -1; });
    if (!items.length) { host.innerHTML = '<div class="v-empty"><div class="v-empty-icon">🗓</div><h3>' + emptyText + '</h3><a class="v-btn v-btn--primary" href="search.html">Find a stay →</a></div>'; return; }
    host.innerHTML = '<div class="v-grid v-grid-2">' + items.map(function (b) {
      var l = d.LISTINGS.find(function (x) { return x.id === b.listing_id; }) || {};
      return '<div class="v-card" style="padding:14px;display:flex;gap:12px;">'
        + '<img src="' + ((l.photos || [])[0]) + '" alt="" style="width:96px;height:96px;border-radius:10px;object-fit:cover;flex:0 0 96px;" />'
        + '<div style="flex:1;"><strong>' + VacationApp.escapeHtml(l.title || '') + '</strong>'
        +   '<div class="v-text-muted" style="font-size:12px;">' + VacationApp.fmtDate(b.check_in) + ' → ' + VacationApp.fmtDate(b.check_out) + ' · ' + b.nights + ' nights</div>'
        +   '<div class="v-text-muted" style="font-size:12px;">Ref: ' + b.ref_number + ' · Total: ' + VacationApp.formatPriceExact(b.pricing.total) + '</div>'
        +   '<div class="v-mt-1"><span class="v-chip ' + b.status + '">' + b.status + '</span></div>'
        +   '<div class="v-flex-wrap v-mt-1">'
        +     '<a class="v-btn v-btn--ghost v-btn--sm" href="stay.html?id=' + b.listing_id + '">View stay</a>'
        +     (b.status === 'confirmed' || b.status === 'pending' ? '<button class="v-btn v-btn--ghost v-btn--sm" onclick="cancelBooking(\'' + b.id + '\')">Cancel</button>' : '')
        +   '</div>'
        + '</div></div>';
    }).join('') + '</div>';
  });
}

window.cancelBooking = function (id) {
  if (!confirm('Cancel this booking? This is a demo — no real refund happens.')) return;
  VacationApp.api('/bookings/' + id + '/cancel', { method: 'POST' }).then(function () {
    window.toast('Booking cancelled', 'success');
    activate();
  });
};

function renderSaved() {
  VacationApp.api('/favorites').then(function (r) {
    if (!r.body.items.length) { host.innerHTML = '<div class="v-empty"><div class="v-empty-icon">♡</div><h3>No saved stays yet</h3><p>Click the heart on any listing to save it here.</p><a class="v-btn v-btn--primary" href="search.html">Browse stays →</a></div>'; return; }
    host.innerHTML = '<div class="v-grid v-grid-3">' + r.body.items.map(function (l) { return VacationApp.listingCard(l); }).join('') + '</div>';
    VacationApp.updateAllPrices();
  });
}

function renderProfile() {
  VacationApp.api('/account').then(function (r) {
    var u = r.body.user;
    host.innerHTML = '<div class="v-panel"><h3 style="margin-top:0;">Profile</h3>'
      + '<div class="v-grid v-grid-2"><div class="v-kpi"><div class="v-kpi-label">Name</div><div class="v-kpi-value" style="font-size:20px;">' + u.name + '</div></div>'
      + '<div class="v-kpi"><div class="v-kpi-label">Email</div><div class="v-kpi-value" style="font-size:16px;">' + u.email + '</div></div>'
      + '<div class="v-kpi"><div class="v-kpi-label">Joined</div><div class="v-kpi-value" style="font-size:18px;">' + u.joined + '</div></div>'
      + '<div class="v-kpi"><div class="v-kpi-label">Currency</div><div class="v-kpi-value" style="font-size:18px;">' + u.currency + '</div></div></div>'
      + '</div>';
  });
}

activate();
</script>
</body>
</html>
